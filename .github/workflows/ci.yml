name: ci

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    ci:
        name: ci
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '22'

            - name: Enable Corepack (Yarn 4)
              run: corepack enable

            - name: Install dependencies
              run: yarn install --immutable

            - name: Check formatting
              run: yarn format:check

            - name: Lint
              run: yarn lint

            - name: Build
              run: yarn build

            - name: Test
              run: yarn test
